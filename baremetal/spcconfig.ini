; SPC-1000 Baremetal Tape Loader Configuration
; Place this file as SD:/spcconfig.ini

; Global tape options
[tape]
; Rewind tape to start on system reset
rewind_on_reset=1

; Sync detection options (used only for diagnostics / legacy scanning;
; the SPC-1000 BIOS performs its own pilot+sync detection natively when bits
; are fed sequentially, so these values do not affect loading alignment).
[sync]
zero_skip=50
pattern=11000000
precursor_zeros=15
start_offset=10

; ROM checksum-bypass patch. NOT required for a clean tape dump - the header
; and data block checksums both match naturally with sequential reading.
; Keep disabled for clean tapes; enable only as a safety net for damaged TAPs.
[checksum_bypass]
enabled=0

; Bit-stream injection used to recover missing bytes from damaged tape dumps.
; Disabled by default (no entries). Add posN/bitsN pairs only when a specific
; dump is known to be missing bytes.
[injection]
