; SPC-1000 Baremetal Tape Loader Configuration
; Place this file as SD:/spcconfig.ini

; Global tape options
[tape]
; Rewind tape to start on system reset
rewind_on_reset=1

; Sync detection options
[sync]
; Number of consecutive zero bits before fast-forwarding through leader tone
zero_skip=50
; 8-bit sync pattern searched after the pilot tone
pattern=11000000
; Required number of leading zeros in the preceding 20 bits to accept a sync
precursor_zeros=15
; Bit offset from the sync start to the first data start bit
start_offset=2

; ROM checksum-bypass patch used to avoid infinite retry loops on damaged TAPs.
; When enabled, the listed ROM addresses are overwritten with the given bytes.
[checksum_bypass]
enabled=1
patch0=0x018A:0x00
patch1=0x018B:0x00
patch2=0x018C:0x00
patch3=0x018F:0x00
patch4=0x0190:0x00
patch5=0x0191:0x00

; Bit-stream injection used to recover missing bytes from damaged tape dumps.
; Each entry injects a 9-bit string (start bit 0 + 8 data bits MSB-first + stop bit 0)
; at the specified tape position the first time the loader reaches it.
[injection]
pos0=14152
bits0=001000110
