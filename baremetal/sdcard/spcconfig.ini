; SPC-1000 Baremetal Tape Loader Configuration
; Place this file as SD:/spcconfig.ini

; Global tape options
[tape]
; Rewind tape to start on system reset
rewind_on_reset=1

; Sync detection options
[sync]
zero_skip=50
pattern=11000000
precursor_zeros=15
start_offset=10

; ROM checksum-bypass patch used to avoid infinite retry loops on damaged TAPs.
; When enabled, the listed ROM addresses are overwritten with the given bytes.
[checksum_bypass]
enabled=0

; Bit-stream injection used to recover missing bytes from damaged tape dumps.
; Each entry injects a 9-bit string (start bit 0 + 8 data bits MSB-first + stop bit 0)
; at the specified tape position the first time the loader reaches it.
[injection]
